%YAML 1.2
---
title: Bindings for lwip library

maintainers:
  - Vineeth Karumanchi <vineeth.karumanchi@amd.com>
  - Srinivas Neeli <srinivas.neeli@amd.com>

type: library

version: 1.0

description: |-
  lwip220 library lwIP (light weight IP) is an open source TCP/IP stack configured for AMD hard and soft Ethernet MACs.

properties:
  reg:
    description: Physical base address and size of the controller register map
  interrupts:
    description: Interrupt property of the controller
  xlnx,txcsum:
    description: Ethernet controller transmit checksum mode (Full, Partial and None)
  xlnx,rxcsum:
    description: Ethernet controller receive checksum mode (Full, Partial and None)
  axistream-connected:
    description: Connected Stream IP Type (1-AXI_FIFO 2-AXI_DMA 3-AXI_MCDMA)
  phy-handle:
    description: Child phy-node phandle property

supported_processors:
  - psx_cortexa78
  - cortexa78
  - psx_cortexr52
  - cortexr52
  - psu_cortexa53
  - psu_cortexr5
  - psv_cortexa72
  - psv_cortexr5
  - ps7_cortexa9
  - microblaze
  - microblaze_riscv

supported_os:
  - standalone
  - freertos10_xilinx

depends:
    emacps:
        - reg
        - interrupts
    axiethernet:
        - reg
        - interrupts
        - xlnx,txcsum
        - xlnx,rxcsum
        - axistream-connected
    emaclite:
        - reg
        - interrupts

examples:
    lwip_example_igmp_main.c:
        - dependency_files: [lwip_example_igmp_app.c, lwip_example_igmp_app.h, lwip_example_platform.c, lwip_example_platform.h, lwip_example_platform_config.h, lwip_example_platform_mb.c, lwip_example_platform_zynq.c, lwip_example_platform_zynqmp.c, lwip_example_i2c_access.c, lwip_example_iic_phyreset.c, lwip_example_sfp.c, lwip_example_si5324.c]
    lwip_example_tftpclient_main.c:
        - dependency_files: [lwip_example_tftp_client.c, lwip_example_tftpclient_common.h, lwip_example_tftp_platform_fs.c, lwip_example_tftp_platform_fs.h, lwip_example_platform.c, lwip_example_platform.h, lwip_example_platform_config.h, lwip_example_platform_mb.c, lwip_example_platform_zynq.c, lwip_example_platform_zynqmp.c, lwip_example_i2c_access.c, lwip_example_iic_phyreset.c, lwip_example_sfp.c, lwip_example_si5324.c]
    lwip_example_tftpserver_main.c:
        - dependency_files: [lwip_example_tftp_server.c, lwip_example_tftpserver_common.h, lwip_example_tftp_platform_fs.c, lwip_example_tftp_platform_fs.h, lwip_example_platform.c, lwip_example_platform.h, lwip_example_platform_config.h, lwip_example_platform_mb.c, lwip_example_platform_zynq.c, lwip_example_platform_zynqmp.c, lwip_example_i2c_access.c, lwip_example_iic_phyreset.c, lwip_example_sfp.c, lwip_example_si5324.c]
    lwip_example_ws_main.c:
        - dependency_files: [lwip_example_webserver.c, lwip_example_webserver.h, lwip_example_web_utils.c, lwip_example_ws_http_response.c, lwip_example_ws_platform_fs.c, lwip_example_tftp_platform_fs.h, lwip_example_platform.c, lwip_example_platform.h, lwip_example_platform_config.h, lwip_example_platform_mb.c, lwip_example_platform_zynq.c, lwip_example_platform_zynqmp.c, lwip_example_i2c_access.c, lwip_example_iic_phyreset.c, lwip_example_sfp.c, lwip_example_si5324.c]
    freertos_lwip_example_igmp_main.c:
        - dependency_files: [lwip_example_iic_phyreset.c, lwip_example_platform_config.h, freertos_lwip_example_igmp_app.c, freertos_lwip_example_igmp_app.h]
    freertos_lwip_example_tftpclient_main.c:
        - dependency_files: [lwip_example_iic_phyreset.c, lwip_example_platform_config.h, freertos_lwip_example_tftp_platform_fs.c, freertos_lwip_example_tftp_platform_fs.h, freertos_lwip_example_tftp_client.c, freertos_lwip_example_tftpclient_common.h]
    freertos_lwip_example_tftpserver_main.c:
        - dependency_files: [lwip_example_iic_phyreset.c, lwip_example_platform_config.h, freertos_lwip_example_tftp_platform_fs.c, freertos_lwip_example_tftp_platform_fs.h, freertos_lwip_example_tftp_server.c, freertos_lwip_example_tftpserver_common.h]
    freertos_lwip_example_ws_main.c:
        - dependency_files: [lwip_example_iic_phyreset.c, lwip_example_platform_config.h, freertos_lwip_example_ws_platform_fs.c, freertos_lwip_example_web_utils.c, freertos_lwip_example_ws_http_response.c, freertos_lwip_example_webserver.c, freertos_lwip_example_webserver.h]
...
