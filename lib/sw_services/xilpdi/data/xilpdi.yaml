%YAML 1.2
---
title: Bindings for xilpdi library.

maintainers:
  - Kundella, Sreedhar <Sreedhar.Kundella@amd.com>

type: library

version: 1.8

description: Xilinx Programmable Device Image (PDI) Library.

supported_processors:
  - condition : |
      supported_processors = []
      if platform in ["Versal"]:
        supported_processors = ["psv_pmc"]
      elif platform in ["VersalNet"]:
        supported_processors = ["psx_pmc", "psxl_pmc"]
      elif platform in ["Versal_2VE_2VM"]:
        supported_processors = ["pmc"]
      else:
        supported_processors = []

supported_os:
  - standalone
  - freertos10_xilinx
