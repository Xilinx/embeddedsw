%YAML 1.2
---
title: Bindings for xilloader library.

maintainers:
  - Kundella, Sreedhar <Sreedhar.Kundella@amd.com>

type: library

version: 2.1

description: Xilinx Versal Platform Loader Library.

supported_processors:
  - condition : |
      supported_processors = []
      if platform in ["Versal"]:
        supported_processors = ["microblaze", "psv_cortexa72", "psv_cortexr5", "psv_pmc", "psu_cortexa72"]
      elif platform in ["VersalNet"]:
        supported_processors = ["microblaze", "psx_cortexa78", "psx_cortexr52", "psx_pmc", "psxl_cortexa78",
                                "psxl_pmc","psxl_cortexr52"]
      elif platform in ["Versal_2VE_2VM"]:
        supported_processors = ["microblaze", "cortexa78", "cortexr52", "pmc"]
      else:
        supported_processors = []

supported_os:
  - standalone
  - freertos10_xilinx

depends_libs:
  xilplmi: {}
  xilffs: {}
  xilsecure: {}

examples:
  xilloader_image_store_pdi_client_example.c:
  xilloader_add_pdi_to_image_store_client_example.c:
  xilloader_remove_pdi_from_image_store_client_example.c:
  xilloader_extract_metaheader_client_example.c:
  xilloader_get_atf_handoff_params_client_example.c:
  xilloader_get_image_info_client_example.c:
  xilloader_get_image_info_list_client_example.c:
  xilloader_load_image_client_example.c:
  xilloader_load_pdi_client_example.c:
  xilloader_update_multiboot_client_example.c:
  xilloader_cfi_selective_readback_example.c:
  xilloader_configure_jtag_status_client_example.c:
  xilloader_read_ddr_crypto_perf_counters_client_example.c:
  xilloader_validate_pdi_auth_example.c:
  xilloader_get_opt_data_example.c:

  condition: |
    examples = []

    versal_procs = ["microblaze", "psv_cortexa72", "psv_cortexr5"]
    versalnet_procs = ["microblaze", "psx_cortexa78", "psx_cortexr52", "psxl_cortexa78", "psxl_cortexr52"]
    versal_2ve_2vm_procs = ["microblaze", "cortexa78", "cortexr52"]
    all_family_procs = ["microblaze", "psv_cortexa72", "psv_cortexr5", "psx_cortexa78", "psx_cortexr52", "psxl_cortexa78", "psxl_cortexr52", "cortexa78", "cortexr52"]

    if platform in ["Versal", "VersalNet", "Versal_2VE_2VM"] and proc in all_family_procs:
      examples += [
        "xilloader_image_store_pdi_client_example.c",
        "xilloader_add_pdi_to_image_store_client_example.c",
        "xilloader_remove_pdi_from_image_store_client_example.c",
        "xilloader_extract_metaheader_client_example.c",
        "xilloader_get_atf_handoff_params_client_example.c",
        "xilloader_get_image_info_client_example.c",
        "xilloader_get_image_info_list_client_example.c",
        "xilloader_load_image_client_example.c",
        "xilloader_load_pdi_client_example.c",
        "xilloader_update_multiboot_client_example.c",
        "xilloader_cfi_selective_readback_example.c",
        "xilloader_get_opt_data_example.c"
      ]

    if platform in ["VersalNet"] and proc in versalnet_procs:
      examples += [
        "xilloader_validate_pdi_auth_example.c",
        "xilloader_configure_jtag_status_client_example.c",
        "xilloader_read_ddr_crypto_perf_counters_client_example.c"
      ]

    if platform in ["Versal_2VE_2VM"] and proc in versal_2ve_2vm_procs:
      examples += [
        "xilloader_validate_pdi_auth_example.c",
        "xilloader_configure_jtag_status_client_example.c",
        "xilloader_read_ddr_crypto_perf_counters_client_example.c"
      ]
...
