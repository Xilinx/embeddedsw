%YAML 1.2
---
title: Bindings for xilsfl library.

maintainers:
  - Srikanth Boyapally <srikanth.boyapally@amd.com>

type: library

version: 1.0

description: Serial NOR Flash Library.

depends:
  ospipsv:
    - reg

supported_processors:
  - condition: |
      supported_processors = ["psv_cortexa72", "psv_cortexr5", "psv_pmc",
      "psv_psm", "psx_cortexr52", "psx_cortexa78", "psx_pmc","psx_psm",
      "microblaze", "microblaze_riscv"]
      if platform in ("microblaze", "microblaze_riscv") and "spartanuplus" not in variant:
          supported_processors = []

supported_os:
  - standalone
  - freertos10_xilinx

examples:
        xilsfl_ospi_flash_readwrite_example.c:
                - supported_platforms:
                        - Versal
                        - VersalNet
                        - SpartanUP
                        - spartanuplus
