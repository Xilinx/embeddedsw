%YAML 1.2
---
title: Bindings for xiltpm library.

maintainers:
  - Kundella, Sreedhar <Sreedhar.Kundella@amd.com>

type: library

description: Xilinx TPM Library provides interface to external TPM module.

supported_processors:
  - condition : |
      supported_processors = []
      if platform in ["Versal"]:
          supported_processors = ["psv_pmc"]
      elif platform in ["Versal_2VE_2VM"]:
          supported_processors = ["pmc"]
      else:
          supported_processors = []

supported_os:
  - standalone

depends_libs:
  xilsecure: {}
