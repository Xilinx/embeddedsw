%YAML 1.2
---
title: Bindings for xilcert library.

maintainers:
  - Harsha, Harsha <harsha.harsha@amd.com>
  - Akula, Kalyani <kalyani.akula@amd.com>
  - Challa, Durga <durga.challa@amd.com>

type: library

description: |
  Xilinx X.509 certificate generation library. Supported only for Versal Net.

supported_processors:
  - condition : |
      supported_processors = []
      if platform in ["VersalNet"]:
        supported_processors = ["psx_pmc"]
      elif platform in ["Versal"]:
        if "Versal_2VP" in variant:
          supported_processors = ["psv_pmc"]
      else:
        supported_processors = []

supported_os:
  - standalone

depends_libs:
  xilplmi: {}
  xilsecure: {}
