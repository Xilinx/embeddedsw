%YAML 1.2
---
title: Bindings for xilskey library.

maintainers:
  - Akula, Kalyani <kalyani.akula@amd.com>
  - Challa, Durga <durga.challa@amd.com>
  - Harsha, Harsha <harsha.harsha@amd.com>

type: library

version: 7.5

description: Xilinx Secure Key Library supports programming efuse and bbram.

supported_processors:
  - condition: |
      supported_processors = ["ps7_cortexa9", "psu_pmu", "psu_cortexa53", "psu_cortexr5", "microblaze"]
      if proc in ("microblaze"):
        if "spartanuplus" not in variant:
          supported_processors = ["microblaze"]
        else:
          supported_processors = []

supported_os:
  - standalone
  - freertos10_xilinx

examples:
  xilskey_bbram_example.c:
    - dependency_files:
      - xilskey_input.h
  xilskey_efuse_example.c:
    - dependency_files:
      - xilskey_input.h
  xilskey_efuseps_zynqmp_example.c:
    - dependency_files:
      - xilskey_efuseps_zynqmp_input.h
  xilskey_bbramps_zynqmp_example.c:
  xilskey_bbram_ultrascale_example.c:
    - dependency_files:
      - xilskey_bbram_ultrascale_input.h
  xilskey_puf_registration_example.c:
    - dependency_files:
      - xilskey_puf_registration.h
  xilskey_puf_regeneration_example.c:

  condition : |
    examples = []

    zynq_procs = ["ps7_cortexa9"]
    zynqmp_procs = ["psu_cortexa53", "psu_cortexr5"]
    ultrascale_procs = ["microblaze"]

    if platform in ["Zynq"] and proc in zynq_procs:
      examples += ["xilskey_bbram_example.c", "xilskey_efuse_example.c"]

    if platform in ["ZynqMP"] and proc in zynqmp_procs:
      examples += ["xilskey_efuseps_zynqmp_example.c", "xilskey_bbramps_zynqmp_example.c",
                   "xilskey_puf_registration_example.c", "xilskey_puf_regeneration_example.c"]

    if proc in ultrascale_procs:
      if "spartanuplus" not in variant:
        examples += ["xilskey_bbram_ultrascale_example.c", "xilskey_efuse_example.c"]
...
