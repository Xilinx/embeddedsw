%YAML 1.2
---
title: Bindings for xilplmi library

maintainers:
  - Kundella, Sreedhar <Sreedhar.Kundella@amd.com>

type: library

version: 2.1

description: Xilinx Versal Platform Loader and Manager Interface Library.

supported_processors:
  - condition : |
      supported_processors = []
      if platform in ["Versal"]:
        supported_processors = ["microblaze", "psv_cortexa72", "psv_cortexr5", "psv_pmc", "psu_cortexa72"]
      elif platform in ["VersalNet"]:
        supported_processors = ["microblaze", "psx_cortexa78", "psx_cortexr52", "psx_pmc", "psxl_cortexa78",
                                "psxl_pmc","psxl_cortexr52"]
      elif platform in ["Versal_2VE_2VM"]:
        supported_processors = ["microblaze", "cortexa78", "cortexr52", "pmc"]
      else:
        supported_processors = []

supported_os:
  - standalone
  - freertos10_xilinx

examples:
  xplmi_event_logging_client_example.c:
  xplmi_get_board_client_example.c:
  xplmi_get_device_id_client_example.c:
  xplmi_tamper_trigger_client_example.c:
  xplmi_glitch_detector_example.c:
  xplmi_usermodule_example.c:
  xilplmi_in_place_plm_update_client_example.c:
  xilplmi_in_place_asu_update_client_example.c:
  xplmi_configure_secure_comm_example.c:

  condition: |
    examples = []

    versal_procs = ["microblaze", "psv_cortexa72", "psv_cortexr5"]
    versalnet_procs = ["microblaze", "psx_cortexa78", "psx_cortexr52", "psxl_cortexa78", "psxl_cortexr52"]
    versal_2ve_2vm_procs = ["microblaze", "cortexa78", "cortexr52"]
    all_family_procs = ["microblaze", "psv_cortexa72", "psv_cortexr5", "psx_cortexa78", "psx_cortexr52", "psxl_cortexa78", "psxl_cortexr52", "cortexa78", "cortexr52"]

    if platform in ["Versal", "VersalNet", "Versal_2VE_2VM"] and proc in all_family_procs:
      examples += [
        "xplmi_event_logging_client_example.c",
        "xplmi_get_board_client_example.c",
        "xplmi_get_device_id_client_example.c",
        "xplmi_tamper_trigger_client_example.c",
        "xplmi_glitch_detector_example.c",
        "xplmi_usermodule_example.c"
      ]

    if platform == "Versal" and proc in versal_procs:
      examples += ["xplmi_configure_secure_comm_example.c"]

    if (platform == "VersalNet" and proc in versalnet_procs) or (platform == "Versal_2VE_2VM" and proc in versal_2ve_2vm_procs):
      examples += ["xilplmi_in_place_plm_update_client_example.c"]

    if platform == "Versal_2VE_2VM" and proc in versal_2ve_2vm_procs:
      examples += ["xilplmi_in_place_asu_update_client_example.c"]
...
