%YAML 1.2
---
title: Bindings for DisplayPort2.1 Receiver Subsystem

maintainers:
  - Lakshmi Prasanna Eachuri <lakshmi.prasanna.eachuri@amd.com>

type: driver

properties:
  compatible:
    OneOf:
      - items:
        - enum:
          - xlnx,v-dp-rxss2-1.0
          - xlnx,v-dp-rxss2-1.1
  reg:
    description: Physical base address and DisplayPort Transmitter Subsystem register map

  xlnx,audio-enable:
    description: 1 if subsystem core supports audio packets being sent by Secondary channel, 0 if not present

  xlnx,bits-per-color:
    description: Maximum bits/color supported by this Subsystem core

  xlnx,hdcp-enable:
    description: 1 if subsystem supports digital content protection(HDCP14), 0 if not present

  xlnx,hdcp22-enable:
    description: 1 if subsystem supports digital content protection(HDCP22), 0 if not present

  xlnx,lane-count:
    description: Maximum lane count supported by this Subsystem core

  xlnx,mode:
    description: 1 if subsystem core supports Multi-stream transport(MST) mode, 0 if not present

  xlnx,num-streams:
    description: The total number of MST streams supported by this Subsystem core

  xlnx,color-format:
    description: Type of color format supported by this Subssytem core

  xlnx,include-axi-iic:
    description: 1 if Subsystem supports Axi i2c support, 0 if not support

  xlnx,include-clk-wiz:
    description: 1 if Subssytem supports clocking wizard support, 0 if not support

  iic-present:
    description: Sub-core instance presence

  iic-connected:
    description: Sub-core instance configuration

  hdcp-timer-present:
    description: Sub-core instance presence

  hdcp-timer-connected:
    description: Sub-core instance configuration

  clkWiz-present:
    description: Sub-core instance presence

  clkWiz-connected:
    description: Sub-core instance configuration

  dp14-present:
    description: Sub-core instance presence

  dp14-connected:
    description: Sub-core instance configuration

  hdcp14-present:
    description: Sub-core instance presence

  hdcp14-connected:
    description: Sub-core instance configuration

  hdcp22-present:
    description: Sub-core instance presence

  hdcp22-connected:
    description: Sub-core instance configuration

  interrupts:
    description: Sub-core interrupt ids

  interrupt-parent:
    description: Interrupt parent

required:
    - compatible
    - reg
    - xlnx,audio-enable
    - xlnx,audio-channels
    - xlnx,bits-per-color
    - xlnx,hdcp-enable
    - xlnx,hdcp22-enable
    - xlnx,lane-count
    - xlnx,mode
    - xlnx,num-streams
    - xlnx,color-format
    - xlnx,include-axi-iic
    - xlnx,include-clk-wiz
    - iic-present
    - iic-connected:
        subnode_phandle:
          - compatible
          - reg
          - xlnx,ten-bit-adr
          - xlnx,gpo-width
          - interrupts
          - interrupt-parent
    - hdcptimer-present
    - hdcptimer-connected:
        subnode_phandle:
          - compatible
          - reg
    - clkWiz-present
    - clkWiz-connected:
        subnode_phandle:
          - compatible
          - reg
    - dp21-present
    - dp21-connected:
        subnode_phandle:
          - compatible
          - reg
          - xlnx,axi-aclk-freq-mhz
          - xlnx,lane-count
          - xlnx,link-rate
          - xlnx,max-bits-per-color
          - xlnx,octa-pixel-enable
          - xlnx,quad-pixel-enable
          - xlnx,dual-pixel-enable
          - xlnx,ycrcb-enable
          - xlnx,yonly-enable
          - xlnx,gt-datawidth
          - xlnx,secondary-support
          - xlnx,number-of-audio-channels
          - xlnx,mst-enable
          - xlnx,number-of-mst-streams
          - xlnx,protocol-selection
          - xlnx,flow-direction
    - hdcp14-present
    - hdcp14-connected:
        subnode_phandle:
          - compatible
          - reg
    - hdcp22-present
    - hdcp22-connected:
        subnode_phandle:
          - compatible
          - reg
    - interrupts: 5
    - interrupt-parent
    - xlnx,examplemodes

config:
    - XDpRxSs_Config

xparam_prefix: DpRXSS

depends:
    video_common: []

examples:
    src/dp21_rx_only/xdprxss_dp21_rx.c:
        - dependency_files:
            - src/dp21_rx_only/videofmc_defs.h
            - src/dp21_rx_only/xdprxss_dp21_rx.c
            - src/dp21_rx_only/xvidframe_crc.c
            - src/dp21_rx_only/xvidframe_crc.h

    dummy/xdprxss_dp21_rx_vcu.txt:
        - dependency_files:
            - src/dp21_rx_only/videofmc_defs.h
            - src/dp21_rx_only/xdprxss_dp21_rx.c
            - src/dp21_rx_only/xvidframe_crc.c
            - src/dp21_rx_only/xvidframe_crc.h
            - src/platforms/vcu_risc/lscript.ld

    src/dp21_pt/xdprxss_dp21_pt.c:
        - dependency_files:
            - src/dp21_pt/clk_set.c
            - src/dp21_pt/clk_set.h
            - src/dp21_pt/main.h
            - src/dp21_pt/menus.c
            - src/dp21_pt/passthrough.c
            - src/dp21_pt/rx.c
            - src/dp21_pt/rx.h
            - src/dp21_pt/si570.c
            - src/dp21_pt/si570drv.c
            - src/dp21_pt/si570drv.h
            - src/dp21_pt/tx.c
            - src/dp21_pt/tx.h
            - src/dp21_pt/videofmc_defs.h
            - src/dp21_pt/xdprxss_dp21_pt.c
            - src/dp21_pt/xvid_clk_gen.c
            - src/dp21_pt/xvidframe_crc.c
            - src/dp21_pt/xvidframe_crc.h
        - xlnx,examplemodes: 1
        - xlnx,hdcp-enable: 0
        - xlnx,num-streams: 1

    dummy/xdprxss_dp21_pt_vcu.txt:
        - dependency_files:
            - src/dp21_pt/clk_set.c
            - src/dp21_pt/clk_set.h
            - src/dp21_pt/main.h
            - src/dp21_pt/menus.c
            - src/dp21_pt/passthrough.c
            - src/dp21_pt/rx.c
            - src/dp21_pt/rx.h
            - src/dp21_pt/si570.c
            - src/dp21_pt/si570drv.c
            - src/dp21_pt/si570drv.h
            - src/dp21_pt/tx.c
            - src/dp21_pt/tx.h
            - src/dp21_pt/videofmc_defs.h
            - src/dp21_pt/xdprxss_dp21_pt.c
            - src/dp21_pt/xvid_clk_gen.c
            - src/dp21_pt/xvidframe_crc.c
            - src/dp21_pt/xvidframe_crc.h
            - src/platforms/vcu_mb/lscript.ld
        - xlnx,examplemodes: 1
        - xlnx,hdcp-enable: 0
        - xlnx,num-streams: 1

    src/dp21_pt_mst/xdprxss_dp21_pt_mst.c:
        - dependency_files:
            - src/dp21_pt_mst/main.h
            - src/dp21_pt_mst/menus.c
            - src/dp21_pt_mst/passthrough.c
            - src/dp21_pt_mst/rx.c
            - src/dp21_pt_mst/rx.h
            - src/dp21_pt_mst/tx.c
            - src/dp21_pt_mst/tx.h
            - src/dp21_pt_mst/videofmc_defs.h
            - src/dp21_pt_mst/xvid_clk_gen.c
            - src/dp21_pt_mst/xvidframe_crc.c
            - src/dp21_pt_mst/xvidframe_crc.h
            - src/dp21_pt_mst/xvid_pat_gen.c
            - src/dp21_pt_mst/xvid_pat_gen.h
            - src/platforms/vcu_mb/lscript.ld
        - xlnx,examplemodes: 1
        - xlnx,hdcp-enable: 0
        - xlnx,num-streams: 4

    src/dp21_pt_hdcp/xdprxss_dp21_pt_hdcp.c:
        - dependency_files:
            - src/dp21_pt_hdcp/aes256.c
            - src/dp21_pt_hdcp/aes256.h
            - src/dp21_pt_hdcp/clk_set.c
            - src/dp21_pt_hdcp/clk_set.h
            - src/dp21_pt_hdcp/eeprom.c
            - src/dp21_pt_hdcp/eeprom.h
            - src/dp21_pt_hdcp/keygen_config.h
            - src/dp21_pt_hdcp/keymgmt.c
            - src/dp21_pt_hdcp/keymgmt_debug.h
            - src/dp21_pt_hdcp/keymgmt_device.c
            - src/dp21_pt_hdcp/keymgmt_device.h
            - src/dp21_pt_hdcp/keymgmt.h
            - src/dp21_pt_hdcp/keymgmt_keyfile.c
            - src/dp21_pt_hdcp/keymgmt_keyfile.h
            - src/dp21_pt_hdcp/keymgmt_loader.c
            - src/dp21_pt_hdcp/keymgmt_loader.h
            - src/dp21_pt_hdcp/keymgmt_testkeys.c
            - src/dp21_pt_hdcp/keys.c
            - src/dp21_pt_hdcp/main.h
            - src/dp21_pt_hdcp/menus.c
            - src/dp21_pt_hdcp/passthrough.c
            - src/dp21_pt_hdcp/rx.c
            - src/dp21_pt_hdcp/rx.h
            - src/dp21_pt_hdcp/sha256.c
            - src/dp21_pt_hdcp/sha256.h
            - src/dp21_pt_hdcp/si570.c
            - src/dp21_pt_hdcp/si570drv.c
            - src/dp21_pt_hdcp/si570drv.h
            - src/dp21_pt_hdcp/tx.c
            - src/dp21_pt_hdcp/tx.h
            - src/dp21_pt_hdcp/videofmc_defs.h
            - src/dp21_pt_hdcp/xdp_hdcp_keys.c
            - src/dp21_pt_hdcp/xdp_hdcp_keys.h
            - src/dp21_pt_hdcp/xhdcp22_example.c
            - src/dp21_pt_hdcp/xhdcp22_example.h
            - src/dp21_pt_hdcp/xvid_clk_gen.c
            - src/dp21_pt_hdcp/xvidframe_crc.c
            - src/dp21_pt_hdcp/xvidframe_crc.h
            - src/platforms/vcu_mb/lscript.ld
        - xlnx,examplemodes: 1
        - xlnx,hdcp-enable: 1
        - xlnx,num-streams: 1
...
