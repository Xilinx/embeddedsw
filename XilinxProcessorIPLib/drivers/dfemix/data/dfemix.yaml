%YAML 1.2
---
title: Bindings for DFE MIX controller

maintainers:
  - Dragan Cvetic <dragan.cvetic@amd.com>

type: driver

properties:
  compatible:
    OneOf:
      - items:
        - enum:
          - xlnx,xdfe-cc-mixer-2.0

  reg:
    description: Physical base address and size of the controller register map
  xlnx,mode:
    description: 0=downlink, 1=uplink, 2=switchable
  xlnx,num-antenna:
    description: Number of antenna
  xlnx,max-useable-ccids:
    description: Max usable CC Ids
  xlnx,lanes:
    description: Number of lanes
  xlnx,antenna-interleave:
    description: Number of antenna slots
  xlnx,mixer-cps:
    description: Mixer Cps
  xlnx,num-auxiliary:
    description: Num auxiliary
  xlnx,data-iwidth:
    description: 16 for 16-bit sample data and 24 for 18-bit sample data
  xlnx,data-owidth:
    description: 16 for 16-bit sample data and 24 for 18-bit sample data
  xlnx,tuser-width:
    description: Tuser width

config:
    - XDfeMix_Config

required:
    - compatible
    - reg
    - xlnx,modeint
    - xlnx,num-antenna
    - xlnx,max-useable-ccids
    - xlnx,lanes
    - xlnx,antenna-interleave
    - xlnx,mixer-cps
    - xlnx,num-auxiliary
    - xlnx,data-iwidth
    - xlnx,data-owidth
    - xlnx,tuser-width

examples:
    xdfemix_examples.c:
        - dependency_files:
            - xdfemix_examples.h
            - xdfemix_multiAddCC_pass_through_example.c
            - xdfemix_one_instance_initialization_example.c
            - xdfemix_pass_through_example.c
            - xdfesi570_mgt.c

depends_libs:
    libmetal: {}
    libmetal_xlnx_extension: {}

...
